title: "Mariner's Memoir"
description: "Long-form thinking on leadership, AI, nonprofits, and ideas worth taking seriously."
url: "https://shubhamspec-412.github.io"
baseurl: "/mariners-memoir"

author:
  name: "Shubham Kumar"
